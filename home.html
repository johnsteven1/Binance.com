<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tell us about yourself</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 375px;
  height: 800px;
  background: #f2f2f2;
  padding: 40px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo {
  margin-top: 18px;
  margin-bottom: 70px;
}

.logo img {
  width: 188px;
  height: 198px;
  object-fit: contain;
}

h1 {
  font-size: 36px;
  font-weight: 600;
  text-align: center;
  color: #000;
  line-height: 1.3;
  margin-bottom: 50px;
}

.card {
  width: 100%;
  background: #ffffff;
  border-radius: 20px;
  padding: 17px;
  margin-bottom: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.card:hover {
  transform: translateY(-3px);
}

.card-text {
  max-width: 80%;
}

.card-title {
  font-size: 18px;
  font-weight: 600;
  color: #000;
  margin-bottom: 6px;
}

.card-desc {
  font-size: 14px;
  color: #8c8c8c;
  line-height: 1.5;
}

.arrow {
  display: flex;
  align-items: center;
  justify-content: center;
}

.arrow svg {
  width: 20px;
  height: 20px;
  stroke: #000;
  stroke-width: 2;
  fill: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- Logo from Link -->
  <div class="logo">
    <img src="file_00000000febc71f5a74feb142c09d534.png" alt="Logo">
  </div>

  <h1>Tell us about yourself!</h1>

  <div class="card" onclick="selectOption('new')">
    <div class="card-text">
      <div class="card-title">I'm new to crypto</div>
      <div class="card-desc">
        I've heard about Bitcoin and I'm willing to trade more popular coins.
      </div>
    </div>
    <div class="arrow">
      <svg viewBox="0 0 24 24">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </div>
  </div>

  <div class="card" onclick="selectOption('familiar')">
    <div class="card-text">
      <div class="card-title">I'm familiar with crypto</div>
      <div class="card-desc">
        I'm experienced in spot or futures trading, open to advanced features.
      </div>
    </div>
    <div class="arrow">
      <svg viewBox="0 0 24 24">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </div>
  </div>

</div>

<script>
function selectOption(type) {

  if(type === 'familiar'){
    document.body.style.opacity = "0.7";

    setTimeout(function(){
      window.location.href = "sc.html";
    }, 2000);
  }

}
</script>
</body>
</html>
