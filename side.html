<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Hot UI on Background - Draggable</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body,html{
height:98%;
}

.background-container{
position:absolute;
top:-19px;
width:96.8%;
height:100vh;
margin-left:6px;
background-image:url('20260306_025243.jpg');
background-size:cover;
background-repeat:no-repeat;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
}

/* BALANCE DISPLAY */
.balance-display{
position:absolute;
top:23%;
left:20.5%;
transform:translate(-50%,-60%);
font-size:24px;
font-weight:700;
line-height:1.3;
letter-spacing:0.3px;
color:#000;
cursor:grab;
z-index:30;
user-select:none;
}

.balance-display:active{
cursor:grabbing;
}

/* Add Funds Button */
.signup-btn{
position:absolute;
top:31.4%;
left:18.3%;
transform:translate(-50%,-19%);
background:#f4c430;
color:#111;
font-size:13px;
font-weight:104;
padding:9.5px;
width:108px;
border:none;
border-radius:3px;
cursor:pointer;
z-index:10;
transition:0.2s;
}

.signup-btn:hover{
background:#e5b800;
}

/* 🌟 Yellow Dot */
.yellow-dot{
position:absolute;
width:10px;
height:5px;
border-radius:50%;
background:;
top:18.6%;
left:93.6%;
cursor:pointer;
z-index:50;
transform:translate(-50%, -240%);
}

.yellow-dot:active{
cursor:grabbing;
}
</style>
</head>

<body>

<div class="background-container">

<div class="balance-display" id="balance">120.82</div>

<button class="signup-btn" onclick="addFunds()">Add Funds</button>

<!-- 🌟 Yellow Dot -->
<div class="yellow-dot" id="yellowDot"></div>

</div>

<script>
/* BALANCE SYSTEM */
let balance = 746.82;

function addFunds(){
    let amount = prompt("Enter amount to add:");
    if(amount === null) return;

    amount = parseFloat(amount);

    if(isNaN(amount) || amount <= 0){
        alert("Enter a valid amount");
        return;
    }

    balance += amount;
    document.getElementById("balance").textContent = balance.toFixed(2);
}

/* DRAG BALANCE */
const balanceBox = document.getElementById("balance");

let draggingBalance = false;
let startX, startY, startLeft, startTop;

balanceBox.addEventListener("mousedown", e => {
    draggingBalance = true;
    startX = e.clientX;
    startY = e.clientY;

    startLeft = parseFloat(window.getComputedStyle(balanceBox).left);
    startTop = parseFloat(window.getComputedStyle(balanceBox).top);

    balanceBox.style.transform = "none";
});

document.addEventListener("mousemove", e => {
    if(!draggingBalance) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    balanceBox.style.left = startLeft + dx + "px";
    balanceBox.style.top = startTop + dy + "px";
});

document.addEventListener("mouseup", () => {
    draggingBalance = false;
});

/* 🌟 Yellow Dot Click Only */
const yellowDot = document.getElementById("yellowDot");

yellowDot.addEventListener("click", () => {
    window.location.replace("recipe2.html");
});
</script>

</body>
</html>
