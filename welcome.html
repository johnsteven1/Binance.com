<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Binance - Welcome</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Roboto',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:#ffffff;
color:#000000;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding: 14px 20px;
}

.container{
width:100%;
max-width:420px;
position:relative;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.close-btn{
font-size:28px;
color:#666;
cursor:pointer;
line-height:1;
}

.close-btn:hover{
color:#000;
}

/* IMAGE LOGO STYLE */

.logo img{
width:24px;
height:25px;
object-fit:contain;
}

h1{
font-size:28px;
font-weight:600;
text-align:left;
margin:14px 0 32px;
color:#000000;
}

.label{
font-size:14px;
color:#444;
margin-bottom:8px;
display:block;
}

.input-wrapper{
position:relative;
margin-bottom:24px;
}

input[type="text"],
input[type="email"],
input[type="tel"]{
width:100%;
height:48px;
background:#ffffff;
border:1px solid #dcdcdc;
border-radius:8px;
color:#000000;
font-size:16px;
padding:0 16px;
outline:none;
transition:border-color .2s;
}

input::placeholder{
color:#999;
}

input:focus{
border-color:#f0b90b;
}

.placeholder-text{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
color:#999;
font-size:16px;
pointer-events:none;
transition:all .2s;
}

.checkbox-container{
display:flex;
align-items:flex-start;
margin:16px 0 24px;
font-size:14px;
color:#555;
}

.checkbox-container input{
margin-top:3px;
margin-right:12px;
accent-color:#f0b90b;
width:18px;
height:18px;
}

.checkbox-container a{
color:#f0b90b;
text-decoration:none;
}

.checkbox-container a:hover{
text-decoration:underline;
}

.btn{
display:block;
width:100%;
height:48px;
background:#f0b90b;
color:#000000;
font-size:16px;
font-weight:600;
border:none;
border-radius:8px;
cursor:pointer;
transition:background .2s;
margin-bottom:16px;
}

.btn:hover{
background:#ffd966;
}

/* OR DIVIDER */

.or-divider{
display:flex;
align-items:center;
text-align:center;
margin:24px 0;
color:#777;
font-size:14px;
}

.or-divider::before,
.or-divider::after{
content:"";
flex:1;
border-bottom:1px solid #e0e0e0;
}

.or-divider span{
padding:0 12px;
}

/* GOOGLE BUTTON */

.google-btn{
display:flex;
align-items:center;
justify-content:center;
width:100%;
height:48px;
background:#ffffff;
border:1px solid #dcdcdc;
border-radius:8px;
color:#000000;
font-size:16px;
font-weight:500;
cursor:pointer;
gap:12px;
position:relative;
}

.google-btn svg{
width:20px;
height:20px;
position:absolute;
left:20px;
}

.google-btn:hover{
background:#f7f7f7;
}

.bottom-links{
text-align:left;
margin-top:32px;
font-size:14px;
color:#666;
}

.bottom-links a{
color:#f0b90b;
text-decoration:none;
margin:0 8px;
}

.bottom-links a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">

<div class="close-btn">×</div>

<!-- IMAGE LOGO -->
<div class="logo">
<img src="file_00000000f56071f4bbc8128c6871d50a.png" alt="Logo">
</div>

</div>
    
    
<h1>Welcome to Binance</h1>

<div class="label">Email/Phone number</div>

<div class="input-wrapper">
<input type="text" id="emailOrPhone" placeholder=" " autocomplete="off"/>
<span class="placeholder-text">Email/Phone (without country code)</span>
</div>

<div class="checkbox-container">
<input type="checkbox" id="agree" checked/>
<label for="agree">
By creating an account, I agree to Binance's
<a href="https://www.binance.com/en/privacy" target="_blank">Privacy Notice</a>.
</label>
</div>

<button class="btn">Continue</button>

<div class="or-divider">
<span>or</span>
</div>

<button class="google-btn">

<svg viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.51h5.84c-.25 1.31-.98 2.42-2.07 3.16v2.63h3.35c1.96-1.81 3.09-4.47 3.09-7.25z" fill="#4285F4"/>
<path d="M12 23c2.97 0 5.46-1.01 7.28-2.73l-3.35-2.63c-1.01.68-2.29 1.08-3.93 1.08-3.02 0-5.58-2.04-6.49-4.79H.96v2.67C2.77 20.39 6.62 23 12 23z" fill="#34A853"/>
<path d="M5.51 14.21c-.23-.68-.36-1.41-.36-2.21s.13-1.53.36-2.21V7.34H.96C.35 8.85 0 10.39 0 12s.35 3.15.96 4.66l4.55-2.45z" fill="#FBBC05"/>
<path d="M12 4.98c1.64 0 3.11.56 4.27 1.66l3.19-3.19C17.46 1.01 14.97 0 12 0 6.62 0 2.77 2.61.96 6.34l4.55 2.45C6.42 6.02 8.98 4.98 12 4.98z" fill="#EA4335"/>
</svg>

Continue with Google
</button>

<div class="bottom-links">
<a href="#">Sign up as an entity</a> or <a href="login.html">Log in</a>
</div>

</div>

<script>

const input=document.getElementById('emailOrPhone');
const placeholder=input.nextElementSibling;

function updatePlaceholder(){

if(input.value.trim()!==''||document.activeElement===input){

placeholder.style.top='8px';
placeholder.style.fontSize='12px';
placeholder.style.transform='none';
placeholder.style.color='#f0b90b';

}else{

placeholder.style.top='50%';
placeholder.style.fontSize='16px';
placeholder.style.transform='translateY(-50%)';
placeholder.style.color='#999';

}

}

input.addEventListener('focus',updatePlaceholder);
input.addEventListener('blur',updatePlaceholder);
input.addEventListener('input',updatePlaceholder);

updatePlaceholder();

</script>

</body>
</html>
