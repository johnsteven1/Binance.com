<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance - Log in</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #ffffff;
  color: #000;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 14px 20px;
}

.container {
  width: 100%;
  max-width: 420px;
}

.top-bar {
  display: flex;
  align-items: center;
  margin-bottom: 20px;
}

.close-btn {
  font-size: 28px;
  color: #666;
  cursor: pointer;
  line-height: 1;
}

.close-btn:hover {
  color: #000;
}

h1 {
  font-size: 28px;
  font-weight: 600;
  margin: 10px 0 32px;
}

.label {
  font-size: 14px;
  color: #444;
  margin-bottom: 8px;
  display: block;
}

.input-wrapper {
  margin-bottom: 24px;
}

input {
  width: 100%;
  height: 48px;
  background: #f5f5f5;
  border: none;
  border-radius: 8px;
  padding: 0 16px;
  font-size: 16px;
  outline: none;
}

input::placeholder {
  color: #999;
}

.btn {
  width: 100%;
  height: 48px;
  background: #f3c533;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn:hover {
  background: #ffd966;
}

.btn:disabled {
  background: #f3c53388;
  cursor: not-allowed;
}

/* ─── Very small bouncing bars loader ─── */
.loader {
  display: flex;
  align-items: flex-end;
  gap: 2px;
}

.bar {
  width: 3px;
  background: #000;
  border-radius: 1px;
  animation: bounce 1s infinite ease-in-out;
}

.bar:nth-child(1) { height: 8px;  animation-delay: 0.34s; }
.bar:nth-child(2) { height: 10px; animation-delay: 0.15s; }
.bar:nth-child(3) { height: 7px;  animation-delay: 0.30s; }
.bar:nth-child(4) { height: 11px; animation-delay: 0.45s; }

@keyframes bounce {
  0%, 100% {
    transform: scaleY(0.9);
  }
  40% {
    transform: scaleY(1.7);
  }
}
/* ────────────────────────────────────────────── */

.hidden {
  display: none;
}

.email-preview {
  color: #777;
  font-size: 15px;
  margin-bottom: 20px;
}

.or-divider {
  display: flex;
  align-items: center;
  text-align: center;
  margin: 24px 0;
  color: #777;
  font-size: 14px;
}

.or-divider::before,
.or-divider::after {
  content: "";
  flex: 1;
  border-bottom: 1px solid #e0e0e0;
}

.or-divider span {
  padding: 0 12px;
}

.passkey-btn, .google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 48px;
  background: #fff;
  border: 1px solid #dcdcdc;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  margin-bottom: 12px;
  gap: 10px;
  position: relative;
}

.passkey-btn img {
  width: 40px;
  height: 40px;
  position: absolute;
  left: 15px;
}

.google-btn svg {
  width: 20px;
  height: 20px;
  position: absolute;
  left: 22.2px;
}

.passkey-btn:hover, .google-btn:hover {
  background: #f7f7f7;
}

.bottom-links {
  margin-top: 32px;
  font-size: 15px;
}

.bottom-links a {
  color: #f0b90b;
  text-decoration: none;
  display: block;
  margin-bottom: 14px;
}

.bottom-links a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <div class="close-btn">×</div>
  </div>

  <h1 id="pageTitle">Log in</h1>

  <!-- EMAIL SECTION -->
  <div id="emailSection">

    <div class="label">Email/Phone number</div>

    <div class="input-wrapper">
      <input id="emailInput" type="text" placeholder="Email/Phone (without country code)">
    </div>

    <button class="btn" id="continueBtn">Continue</button>

  </div>

  <!-- PASSWORD SECTION -->
  <div id="passwordSection" class="hidden">

    <div id="emailPreview" class="email-preview"></div>

    <div class="label">Password</div>

    <div class="input-wrapper">
      <input id="passwordInput" type="password" placeholder="Password">
    </div>

    <button class="btn" id="loginBtn">Log in</button>

  </div>

  <div class="or-divider" id="orDivider">
    <span>or</span>
  </div>

  <button class="passkey-btn" id="passkeyBtn">
    <img src="file_000000007bb07246b64d35cf30abf491.png" alt="Logo">
    Continue with Passkey
  </button>

  <button class="google-btn" id="googleBtn">
    <svg viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.51h5.84c-.25 1.31-.98 2.42-2.07 3.16v2.63h3.35c1.96-1.81 3.09-4.47 3.09-7.25z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-1.01 7.28-2.73l-3.35-2.63c-1.01.68-2.29 1.08-3.93 1.08-3.02 0-5.58-2.04-6.49-4.79H.96v2.67C2.77 20.39 6.62 23 12 23z" fill="#34A853"/>
      <path d="M5.51 14.21c-.23-.68-.36-1.41-.36-2.21s.13-1.53.36-2.21V7.34H.96C.35 8.85 0 10.39 0 12s.35 3.15.96 4.66l4.55-2.45z" fill="#FBBC05"/>
      <path d="M12 4.98c1.64 0 3.11.56 4.27 1.66l3.19-3.19C17.46 1.01 14.97 0 12 0 6.62 0 2.77 2.61.96 6.34l4.55 2.45C6.42 6.02 8.98 4.98 12 4.98z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="bottom-links" id="bottomLinks">
    <a href="welcome.html" id="createAccountLink">Create a Binance Account</a>
    <a href="#" id="helpLink">Need help?</a>
  </div>

</div>


<script>

function maskEmail(email) {
  if (!email.includes("@")) return email;
  let parts = email.split("@");
  let name = parts[0];
  let domain = parts[1];
  return name.charAt(0) + "***@" + domain;
}

function showPasswordSection() {
  const email = document.getElementById("emailInput").value.trim();
  if (!email) {
    alert("Please enter your email or phone number");
    return;
  }

  const btn = document.getElementById("continueBtn");
  btn.disabled = true;
  btn.innerHTML = `
    <div class="loader">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  `;

  setTimeout(() => {
    document.getElementById("emailSection").style.display = "none";
    document.getElementById("passwordSection").classList.remove("hidden");

    document.getElementById("pageTitle").innerText = "Enter your password";
    document.getElementById("emailPreview").innerText = maskEmail(email);

    document.getElementById("orDivider").style.display = "none";
    document.getElementById("passkeyBtn").style.display = "none";
    document.getElementById("googleBtn").style.display = "none";

    document.getElementById("createAccountLink").style.display = "none";
    document.getElementById("helpLink").innerText = "Forgot password?";
  }, 1500);
}

function handleLogin() {
  const password = document.getElementById("passwordInput").value.trim();
  const btn = document.getElementById("loginBtn");

  if (!password) {
    alert("Please enter your password");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `
    <div class="loader">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  `;

  // Simulate login delay (in real app → send to server here)
  setTimeout(() => {
    // Option A: redirect to another page
    window.location.href = "yellow.html";          // ← CHANGE THIS to your real page

    // Option B: (uncomment if you want to show success instead of redirect)
    // btn.innerHTML = "Success!";
    // setTimeout(() => { window.location.href = "dashboard.html"; }, 800);

  }, 1800);
}

// Attach event listeners
document.getElementById("continueBtn").addEventListener("click", showPasswordSection);
document.getElementById("loginBtn").addEventListener("click", handleLogin);

// Optional: allow pressing Enter in inputs
document.getElementById("emailInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") showPasswordSection();
});
document.getElementById("passwordInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") handleLogin();
});

</script>

</body>
</html>
